<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GoodRolls PvP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0b0b0e;
            --card-bg: #1c1c1e;
            --accent-blue: #2970ff;
            --accent-yellow: #ffb800;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --wheel-border: #151517;
            --nav-bg: #151517;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-dark); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Views */
        .view-container { flex: 1; position: relative; overflow: hidden; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
        .view.active { opacity: 1; pointer-events: all; }

        /* --- ROLLS VIEW --- */
        .top-nav { display: flex; justify-content: center; align-items: center; padding: 15px 20px; z-index: 10; position: relative; }
        .pool-display { display: flex; flex-direction: column; align-items: center; }
        .pool-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .pool-value { font-size: 15px; font-weight: 800; background: var(--card-bg); padding: 6px 16px; border-radius: 20px; margin-top: 4px; border: 1px solid rgba(255,255,255,0.05); }

        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 10px; overflow: hidden; }
        .wheel-container { position: relative; width: 280px; height: 280px; margin-bottom: 20px; flex-shrink: 0; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid var(--wheel-border); position: relative; overflow: hidden; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); background: #2b2b36; }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: var(--wheel-border); border-radius: 50%; z-index: 20; display: flex; align-items: center; justify-content: center; }
        .center-text { font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 20px; height: 20px; background: white; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 30; }

        .mini-controls { width: 90%; display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .balance-pill { background: var(--card-bg); padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; }
        .custom-ton-icon { width: 18px; height: 18px; object-fit: contain; }
        .bal-val { font-weight: 700; font-size: 14px; }
        .plus-btn { width: 24px; height: 24px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .plus-btn svg { width: 12px; height: 12px; fill: white; }

        .main-controls { width: 90%; display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-yellow { flex: 1; background: var(--accent-yellow); color: #000; border: none; padding: 16px; border-radius: 14px; font-size: 15px; font-weight: 800; cursor: pointer; }
        .bet-input-wrap { flex: 1; background: var(--card-bg); border-radius: 14px; display: flex; align-items: center; padding: 0 10px; }
        .bet-input-wrap img { width: 16px; height: 16px; }
        .bet-input-wrap input { width: 100%; background: transparent; border: none; color: white; font-size: 16px; font-weight: 800; text-align: center; outline: none; }

        .players-sheet { width: 100%; flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 20px; }
        .sheet-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 800; margin-bottom: 12px; }
        .players-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-bottom: 20px; }
        .player-card { background: var(--card-bg); border-radius: 16px; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .p-left { display: flex; align-items: center; gap: 10px; }
        .p-avatar { width: 36px; height: 36px; border-radius: 50%; background: #252528; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .p-avatar img, .p-avatar svg { width: 100%; height: 100%; object-fit: cover; }
        .p-name { font-size: 14px; font-weight: 700; }
        .p-bet { display: flex; align-items: center; gap: 4px; font-size: 14px; font-weight: 800; color: var(--accent-blue); }
        .p-bet img { width: 12px; height: 12px; }

        /* --- PROFILE VIEW --- */
        #view-profile { align-items: center; justify-content: center; padding: 20px; }
        .prof-avatar { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; background: #252528; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .prof-avatar img, .prof-avatar svg { width: 100%; height: 100%; object-fit: cover; }
        .prof-name { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        .btn-settings { background: var(--card-bg); color: white; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 800; width: 100%; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; position: relative; }
        
        /* Скрытая кнопка щита */
        .admin-shield { position: absolute; right: 15px; width: 20px; height: 20px; fill: white; opacity: 0.03; cursor: default; }

        /* --- BOTTOM NAV --- */
        .bottom-nav { background: var(--nav-bg); width: 100%; height: 70px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); border: none; background: transparent; cursor: pointer; font-size: 12px; font-weight: 600; flex: 1; }
        .nav-item svg { width: 24px; height: 24px; fill: var(--text-muted); }
        .nav-item.active { color: white; }
        .nav-item.active svg { fill: white; }

        /* --- MODALS & ALERTS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: var(--card-bg); width: 90%; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; }
        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; text-align: center; }
        
        /* Red GUI Limit */
        .red-limit-gui { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) scale(0.9); background: #ff3b30; color: white; padding: 12px 20px; border-radius: 12px; font-weight: 800; font-size: 14px; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 3000; box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4); text-align: center; }
        .red-limit-gui.show { opacity: 1; transform: translateX(-50%) scale(1); }

        /* Winner Bottom Sheet */
        .winner-sheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #1c1c1e; border-radius: 24px 24px 0 0; padding: 30px 20px 40px; display: flex; flex-direction: column; align-items: center; transition: bottom 0.4s cubic-bezier(0.1, 0, 0.1, 1); z-index: 2000; }
        .winner-sheet.show { bottom: 0; }
        .win-title { font-size: 14px; font-weight: 800; color: var(--text-muted); margin-bottom: 15px; }
        .win-ava { width: 70px; height: 70px; border-radius: 50%; overflow: hidden; margin-bottom: 10px; background: #333; display: flex; justify-content: center; align-items: center; }
        .win-ava img, .win-ava svg { width: 100%; height: 100%; object-fit: cover; }
        .win-name { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
        .win-amount { font-size: 24px; font-weight: 800; color: #34c759; margin-bottom: 25px; }
        .btn-white { background: white; color: black; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 800; width: 100%; cursor: pointer; }

        /* Admin UI */
        .admin-input { width: 100%; background: #2b2b36; border: none; border-radius: 10px; padding: 12px; color: white; margin-bottom: 10px; outline: none; font-weight: 600; font-size: 16px; }
        .admin-stat { background: #151517; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.6; }
        .admin-row { display: flex; gap: 10px; }
        .admin-row button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-add { background: var(--accent-blue); color: white; }
        .btn-rem { background: #ff3b30; color: white; }
        .btn-close { background: #333; color: white; padding: 14px; border-radius: 12px; border: none; font-weight: 800; margin-top: 10px; cursor: pointer; }

    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></symbol>
        <symbol id="icon-user" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></symbol>
        <symbol id="icon-rolls" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2" stroke="currentColor" fill="none"/><circle cx="12" cy="12" r="3" fill="currentColor"/></symbol>
        <symbol id="icon-shield" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></symbol>
        <symbol id="icon-settings" viewBox="0 0 24 24"><path d="M19.4 13l1.1 1.6c.3.4.4 1 .2 1.4l-1.9 3.3c-.3.4-.8.6-1.3.5l-1.8-.6c-.5.4-1.1.8-1.7 1l-.4 1.9c-.1.5-.6.9-1.1.9h-3.8c-.5 0-1-.4-1.1-.9l-.4-1.9c-.6-.2-1.2-.6-1.7-1l-1.8.6c-.5.1-1-.1-1.3-.5l-1.9-3.3c-.2-.4-.1-1 .2-1.4L4.6 13c0-.3 0-.7 0-1s0-.7.1-1L3.6 9.4c-.3-.4-.4-1-.2-1.4l1.9-3.3c.3-.4.8-.6 1.3-.5l1.8.6c.5-.4 1.1-.8 1.7-1l.4-1.9C10.6 1.4 11.1 1 11.6 1h3.8c.5 0 1 .4 1.1.9l.4 1.9c.6.2 1.2.6 1.7 1l1.8-.6c.5-.1 1 .1 1.3.5l1.9 3.3c.2.4.1 1-.2 1.4l-1.1 1.6c.1.3.1.7.1 1s-.1.7-.1 1zM12 15.5c1.9 0 3.5-1.6 3.5-3.5s-1.6-3.5-3.5-3.5-3.5 1.6-3.5 3.5 1.6 3.5 3.5 3.5z"/></symbol>
    </svg>

    <div id="redLimitGui" class="red-limit-gui">Больше получить TON нельзя</div>

    <div class="view-container">
        <div id="view-rolls" class="view active">
            <div class="top-nav">
                <div class="pool-display">
                    <span class="pool-title">БАНК ИГРЫ</span>
                    <span class="pool-value"><span id="topBank">0.00</span> TON</span>
                </div>
            </div>

            <div class="game-area">
                <div class="wheel-container">
                    <div class="pointer"></div>
                    <div id="wheel" class="wheel"></div>
                    <div class="wheel-center">
                        <span class="center-text" id="centerStatus">ЖДЕМ</span>
                    </div>
                </div>

                <div class="mini-controls">
                    <div class="balance-pill">
                        <img src="" class="custom-ton-icon tonImageSrc">
                        <span class="bal-val" id="userBalance">10.00</span>
                        <div class="plus-btn" onclick="addFreeTon()"><svg><use href="#icon-plus"></use></svg></div>
                    </div>
                </div>

                <div class="main-controls">
                    <button class="btn-yellow" onclick="joinPvP()">Add to PvP</button>
                    <div class="bet-input-wrap">
                        <input type="number" id="betInput" value="1.0" step="0.1" min="0.1">
                        <img src="" class="custom-ton-icon tonImageSrc" style="margin-left:5px;">
                    </div>
                </div>

                <div class="players-sheet">
                    <div class="sheet-header"><span>Игроки</span><span id="playerCount">0/10</span></div>
                    <div class="players-list" id="playersList"></div>
                </div>
            </div>
        </div>

        <div id="view-profile" class="view">
            <div class="prof-avatar" id="profAvatarDisplay"><svg style="width:50%;height:50%;fill:#8e8e93"><use href="#icon-user"></use></svg></div>
            <h2 class="prof-name" id="profNameDisplay">@Username</h2>
            
            <button class="btn-settings" onclick="openSettings()">
                <svg style="width:20px;height:20px;fill:white;"><use href="#icon-settings"></use></svg> Настройки
                <svg class="admin-shield" onclick="event.stopPropagation(); triggerAdmin()"><use href="#icon-shield"></use></svg>
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('rolls', this)">
            <svg><use href="#icon-rolls"></use></svg><span>Rolls</span>
        </button>
        <button class="nav-item" onclick="switchTab('profile', this)">
            <svg><use href="#icon-user"></use></svg><span>Profil</span>
        </button>
    </div>

    <div id="winnerSheet" class="winner-sheet">
        <div class="win-title">ПОБЕДИТЕЛЬ</div>
        <div class="win-ava" id="winAva"></div>
        <div class="win-name" id="winName">@User</div>
        <div class="win-amount" id="winAmount">+0.00 TON</div>
        <button class="btn-white" onclick="closeWinner()">ХОРОШО</button>
    </div>

    <div id="modalSettings" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title">Настройки</div>
            <div style="color:var(--text-muted); text-align:center; margin-bottom:20px;">Настройки профиля GoodRolls</div>
            <button class="btn-close" onclick="closeModal('modalSettings')">Закрыть</button>
        </div>
    </div>

    <div id="modalAdmin" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-title" style="color: #ff3b30;">Админ Панель</div>
            <input type="text" id="adminSearch" class="admin-input" placeholder="Введите @username">
            <button class="btn-yellow" style="width:100%; margin-bottom:15px; padding:12px;" onclick="searchUser()">Найти</button>
            
            <div id="adminUserStats" style="display: none;">
                <div class="admin-stat">
                    <div><b>Юзер:</b> <span id="adName"></span></div>
                    <div><b>Баланс:</b> <span id="adBal"></span> TON</div>
                    <div><b>Выиграл:</b> <span id="adWon"></span> TON</div>
                    <div><b>Проиграл:</b> <span id="adLost"></span> TON</div>
                </div>
                <input type="number" id="adminAmount" class="admin-input" placeholder="Сумма TON">
                <div class="admin-row">
                    <button class="btn-add" onclick="modifyBalance(true)">Зачислить</button>
                    <button class="btn-rem" onclick="modifyBalance(false)">Убрать</button>
                </div>
            </div>
            <button class="btn-close" onclick="closeModal('modalAdmin')">Закрыть</button>
        </div>
    </div>

    <script>
        // =========================================================
        // НАСТРОЙКИ КАРТИНОК
        // Вставь прямую ссылку на свою картинку TON в кавычки ниже
        // =========================================================
        const MY_TON_IMAGE = "https://i.ibb.co/WvXnCS81/i.png"; 
        
        // Применяем кастомную картинку ТОН
        document.querySelectorAll('.tonImageSrc').forEach(img => img.src = MY_TON_IMAGE);

        // Инициализация юзера (Telegram WebApp)
        let myUser = { username: "@DanyaTAG", avatar: '<svg style="width:50%;height:50%;fill:#8e8e93"><use href="#icon-user"></use></svg>', balance: 0.0 };
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe.user) {
            const tgUser = window.Telegram.WebApp.initDataUnsafe.user;
            myUser.username = "@" + (tgUser.username || tgUser.first_name);
        }
        document.getElementById('profNameDisplay').innerText = myUser.username;

        // Навигация
        function switchTab(tabId, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            btn.classList.add('active');
        }

        function openSettings() { document.getElementById('modalSettings').style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // =========================================================
        // ЛОГИКА БЕСПЛАТНЫХ TON (+ ПЛЮСИК)
        // =========================================================
        let freeTonClicks = 0;
        function addFreeTon() {
            if(freeTonClicks < 10) {
                myUser.balance += 1.0;
                freeTonClicks++;
                updateBalanceUI();
            } else {
                showRedLimit();
            }
        }

        function showRedLimit() {
            const gui = document.getElementById('redLimitGui');
            gui.classList.add('show');
            setTimeout(() => gui.classList.remove('show'), 2500);
        }

        function updateBalanceUI() {
            document.getElementById('userBalance').innerText = myUser.balance.toFixed(2);
        }
        updateBalanceUI();

        // =========================================================
        // АДМИН ПАНЕЛЬ (Симуляция БД)
        // =========================================================
        let fakeDB = {
            [myUser.username]: { bal: myUser.balance, won: 15.5, lost: 5.0 }
        };

        function triggerAdmin() {
            let pass = prompt("Введите пароль доступа:");
            if(pass === "adminfrag123") {
                document.getElementById('modalAdmin').style.display = 'flex';
                closeModal('modalSettings');
            } else if(pass !== null) {
                alert("Неверный пароль!");
            }
        }

        function searchUser() {
            let name = document.getElementById('adminSearch').value;
            if(!name.startsWith('@')) name = '@' + name;
            
            // Если юзера нет в БД, создаем пустышку для примера
            if(!fakeDB[name]) fakeDB[name] = { bal: 0, won: 0, lost: 0 };
            
            let u = fakeDB[name];
            document.getElementById('adName').innerText = name;
            document.getElementById('adBal').innerText = u.bal.toFixed(2);
            document.getElementById('adWon').innerText = u.won.toFixed(2);
            document.getElementById('adLost').innerText = u.lost.toFixed(2);
            document.getElementById('adminUserStats').style.display = 'block';
        }

        function modifyBalance(isAdd) {
            let name = document.getElementById('adName').innerText;
            let amount = parseFloat(document.getElementById('adminAmount').value);
            if(isNaN(amount) || amount <= 0) return;

            if(isAdd) fakeDB[name].bal += amount;
            else fakeDB[name].bal = Math.max(0, fakeDB[name].bal - amount);

            // Если меняем свой баланс, обновляем UI
            if(name === myUser.username) {
                myUser.balance = fakeDB[name].bal;
                updateBalanceUI();
            }
            searchUser(); // Обновить статистику
            document.getElementById('adminAmount').value = '';
        }

        // =========================================================
        // ИГРА PvP (Фронтенд-симуляция)
        // =========================================================
        let playersInGame = [];
        let gameBank = 0;

        function joinPvP() {
            let bet = parseFloat(document.getElementById('betInput').value);
            if(isNaN(bet) || bet < 0.1) return alert("Минимальная ставка 0.1 TON");
            if(myUser.balance < bet) return alert("Недостаточно TON");

            myUser.balance -= bet;
            updateBalanceUI();

            playersInGame.push({ name: myUser.username, avatar: myUser.avatar, bet: bet, color: '#2970ff' });
            updateGameUI();
            
            // Симуляция: через секунду заходит другой игрок и крутится колесо
            setTimeout(() => {
                playersInGame.push({ name: "@GoodRollsBot", avatar: '<svg style="width:50%;height:50%;fill:#8e8e93"><use href="#icon-user"></use></svg>', bet: bet, color: '#ffb800' });
                updateGameUI();
                spinWheel();
            }, 1000);
        }

        function updateGameUI() {
            gameBank = playersInGame.reduce((sum, p) => sum + p.bet, 0);
            document.getElementById('topBank').innerText = gameBank.toFixed(2);
            document.getElementById('playerCount').innerText = `${playersInGame.length}/10`;

            const list = document.getElementById('playersList');
            list.innerHTML = playersInGame.map(p => `
                <div class="player-card">
                    <div class="p-left">
                        <div class="p-avatar">${p.avatar}</div>
                        <div class="p-name">${p.name}</div>
                    </div>
                    <div class="p-bet">${p.bet} <img src="${MY_TON_IMAGE}"></div>
                </div>
            `).join('');

            // Отрисовка цветов колеса
            const wheel = document.getElementById('wheel');
            if(playersInGame.length > 0) {
                let grad = [];
                let currPct = 0;
                playersInGame.forEach(p => {
                    let pct = (p.bet / gameBank) * 100;
                    grad.push(`${p.color} ${currPct}% ${currPct + pct}%`);
                    currPct += pct;
                });
                wheel.style.background = `conic-gradient(${grad.join(',')})`;
            }
        }

        function spinWheel() {
            document.getElementById('centerStatus').innerText = "КРУТИМ";
            const wheel = document.getElementById('wheel');
            let randomDeg = 360 * 5 + Math.floor(Math.random() * 360); // 5 оборотов + рандом
            wheel.style.transform = `rotate(${randomDeg}deg)`;

            setTimeout(() => {
                document.getElementById('centerStatus').innerText = "ЖДЕМ";
                // Симуляция победы текущего юзера
                showWinner(myUser.username, myUser.avatar, gameBank);
                
                // Сброс
                playersInGame = [];
                gameBank = 0;
                wheel.style.transition = 'none';
                wheel.style.transform = `rotate(0deg)`;
                setTimeout(() => wheel.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)', 50);
                updateGameUI();
            }, 6200);
        }

        // =========================================================
        // ГУИШКА ПОБЕДИТЕЛЯ
        // =========================================================
        function showWinner(name, avatarStr, amount) {
            document.getElementById('winAva').innerHTML = avatarStr;
            document.getElementById('winName').innerText = name;
            document.getElementById('winAmount').innerText = "+" + amount.toFixed(2) + " TON";
            
            myUser.balance += amount; // Начисляем выигрыш
            updateBalanceUI();

            document.getElementById('winnerSheet').classList.add('show');
        }

        function closeWinner() {
            document.getElementById('winnerSheet').classList.remove('show');
        }
    </script>
</body>
</html>
